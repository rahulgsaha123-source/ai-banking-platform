version: '3.8'

services:
  # --- Centralized Database Engine ---
  # --- Centralized Database Engine ---
  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - banking-network

  # --- Spring Boot Auth Service ---
  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    container_name: banking-auth-service
    ports:
      - "8081:8081"
    environment:
      # This overrides the localhost URL in your application.yml!
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/authdb
    depends_on:
      - postgres
    networks:
      - banking-network

  # --- Event-Driven Messaging (Kafka) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: banking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - banking-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - banking-network

volumes:
  pgdata:

networks:
  banking-network:
    driver: bridge